version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: index-tts-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-indextts}
      POSTGRES_USER: ${DB_USER:-indextts}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-indextts}
    ports:
      - "5422:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-indextts} -d ${DB_NAME:-indextts}"]
      interval: 10s
      timeout: 5s
      retries: 5

  index-tts:
    build: .
    image: index-tts-server
    env_file:
      - .env.example
    container_name: index-tts-server
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - CUDA_LAUNCH_BLOCKING=1
      - TORCH_CUDA_ARCH_LIST=8.9
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-indextts}
      - DB_USER=${DB_USER:-indextts}
      - DB_PASSWORD=${DB_PASSWORD:-indextts}
    ports:
      - "${PORT:-8001}:${PORT:-8001}"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # - ./audio_prompts:/app/audio_prompts
      # - ./assets:/app/assets
      # - ./logs:/app/logs  # 添加logs目錄mapping
      - .:/app
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
