<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>替換規則管理</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Theme variables ── */
  :root[data-theme="dark"] {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c8eff;
    --accent-hover: #8aa3ff;
    --accent-dim: rgba(108,142,255,0.12);
    --danger: #ff5c6c;
    --danger-hover: #ff7a87;
    --danger-dim: rgba(255,92,108,0.12);
    --success: #4ade80;
    --warn: #fbbf24;
    --text: #e2e8f0;
    --text-muted: #7b8db0;
    --text-dim: #4a5578;
    --select-bg: #0f1117;
    --select-text: #e2e8f0;
    --select-selected-bg: #6c8eff;
    --select-selected-text: #0f1117;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --theme-icon: "☀️";
  }
  :root[data-theme="light"] {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --surface2: #f5f7fc;
    --border: #d0d7e8;
    --accent: #4166e8;
    --accent-hover: #2f55d4;
    --accent-dim: rgba(65,102,232,0.1);
    --danger: #e02d3c;
    --danger-hover: #c0202e;
    --danger-dim: rgba(224,45,60,0.1);
    --success: #16a34a;
    --warn: #d97706;
    --text: #1a2035;
    --text-muted: #5a6a8a;
    --text-dim: #9aa5c0;
    --select-bg: #ffffff;
    --select-text: #1a2035;
    --select-selected-bg: #4166e8;
    --select-selected-text: #ffffff;
    --shadow: 0 4px 24px rgba(0,0,0,0.1);
    --theme-icon: "🌙";
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 32px 16px;
    transition: background .2s, color .2s;
  }

  .container { max-width: 1000px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 32px;
  }
  .header-left h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .header-left p { color: var(--text-muted); font-size: 13px; }

  /* Theme toggle */
  .theme-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; cursor: pointer;
    font-size: 18px; line-height: 1; transition: all .15s;
    flex-shrink: 0; margin-top: 2px;
  }
  .theme-btn:hover { border-color: var(--accent); background: var(--accent-dim); }

  /* Set selector bar */
  .set-bar {
    display: flex; gap: 10px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px;
    margin-bottom: 24px;
  }
  .set-bar label { color: var(--text-muted); white-space: nowrap; font-size: 13px; }
  .set-bar input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px;
    color: var(--text); font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  .set-bar input:focus { border-color: var(--accent); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; transition: all .15s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--accent-dim); color: var(--text); border-color: var(--accent); }
  .btn-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid transparent; }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Stats bar */
  .stats-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .stats-bar .count { font-size: 13px; color: var(--text-muted); }
  .stats-bar .count span { color: var(--accent); font-weight: 600; }

  /* Table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; margin-bottom: 24px;
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th {
    text-align: left; padding: 12px 16px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text-muted); border-bottom: 1px solid var(--border);
  }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--accent-dim); }

  .cell-pattern {
    font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px; color: #a78bfa;
    max-width: 260px; word-break: break-all;
  }
  :root[data-theme="light"] .cell-pattern { color: #5b21b6; }
  .cell-replacement {
    font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px; color: var(--success);
    max-width: 180px; word-break: break-all;
  }
  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 99px;
    font-size: 11px; font-weight: 600;
  }
  .badge-regex { background: rgba(251,191,36,.15); color: var(--warn); }
  .badge-plain { background: rgba(74,222,128,.12); color: var(--success); }
  :root[data-theme="light"] .badge-plain { background: rgba(22,163,74,.12); }
  .badge-flag { background: var(--accent-dim); color: var(--accent); margin: 1px 2px; }
  .actions { display: flex; gap: 6px; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 16px; color: var(--text-dim); }
  .empty p { font-size: 13px; }

  /* Set list */
  .set-list-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px; margin-bottom: 24px;
  }
  .set-list-header {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px;
  }
  .set-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .set-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 99px; cursor: pointer;
    background: var(--accent-dim); border: 1px solid var(--border);
    font-size: 13px; color: var(--text); transition: all .15s;
  }
  .set-chip:hover { border-color: var(--accent); background: var(--accent); color: #fff; }
  .set-chip .chip-count {
    font-size: 11px; color: var(--text-muted);
    background: var(--surface2); padding: 1px 6px;
    border-radius: 99px; transition: all .15s;
  }
  .set-chip:hover .chip-count { background: rgba(255,255,255,.2); color: #fff; }
  .set-list-empty { font-size: 13px; color: var(--text-dim); }

  /* Form card / modal */
  .form-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; margin-bottom: 24px;
  }
  .form-card h2, .modal h2 {
    font-size: 15px; font-weight: 600; margin-bottom: 18px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .form-group input, .form-group textarea {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 12px;
    color: var(--text); font-size: 13px; outline: none;
    font-family: inherit; transition: border-color .2s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 70px; }

  /* ── Custom flag checkboxes ── */
  .flags-group { display: flex; flex-direction: column; gap: 6px; }
  .flag-option {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; transition: border-color .15s, background .15s;
    user-select: none;
  }
  .flag-option:hover { border-color: var(--accent); background: var(--accent-dim); }
  .flag-option input[type="checkbox"] {
    width: 15px; height: 15px; accent-color: var(--accent);
    cursor: pointer; flex-shrink: 0;
  }
  .flag-option .flag-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .flag-option .flag-desc { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .toggle-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px;
  }
  .toggle-row label { font-size: 13px; color: var(--text); cursor: pointer; user-select: none; }
  .toggle-row .hint { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }

  .form-actions {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border);
  }

  /* Bulk import */
  .bulk-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; margin-bottom: 24px;
  }
  .bulk-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .bulk-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
  .bulk-card textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px;
    color: var(--text); font-family: 'Fira Code', monospace; font-size: 12px;
    outline: none; resize: vertical; min-height: 140px;
    transition: border-color .2s;
  }
  .bulk-card textarea:focus { border-color: var(--accent); }
  .bulk-actions { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
  .bulk-hint { font-size: 11px; color: var(--text-dim); margin-left: auto; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow); z-index: 9999;
    transform: translateY(80px); opacity: 0;
    transition: all .25s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: var(--surface); color: var(--success); border: 1px solid rgba(74,222,128,.4); }
  #toast.error   { background: var(--surface); color: var(--danger);  border: 1px solid rgba(255,92,108,.4); }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 100; display: none; align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 28px; width: 560px; max-width: 95vw;
    box-shadow: var(--shadow);
  }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .set-bar { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <h1>替換規則管理</h1>
      <p>管理 TTS 文字替換規則，輸入規則組名稱後載入進行新增、修改或刪除。</p>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切換明暗模式">☀️</button>
  </div>

  <!-- Set list -->
  <div class="set-list-card" id="setListCard">
    <div class="set-list-header">已建立的規則組</div>
    <div class="set-chips" id="setChips">
      <span class="set-list-empty">載入中...</span>
    </div>
  </div>

  <!-- Set selector -->
  <div class="set-bar">
    <label>規則組名稱</label>
    <input id="setNameInput" placeholder="例如：jti、healthy2、default" value="">
    <button class="btn btn-primary" onclick="loadRules()">載入規則</button>
    <button class="btn btn-ghost" onclick="showAddForm()">＋ 新增規則</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="count">共 <span id="ruleCount">0</span> 條規則</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="showBulkImport()">批次匯入</button>
      <button class="btn btn-danger btn-sm" onclick="clearAllRules()">清空此組</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="tableWrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>比對 Pattern</th>
          <th>替換結果</th>
          <th>類型</th>
          <th>Flags</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="rulesBody"></tbody>
    </table>
  </div>

  <div id="emptyState" style="display:none">
    <div class="empty">
      <p style="margin-bottom:8px;font-size:32px">📭</p>
      <p>此規則組目前沒有規則，點擊「新增規則」開始建立。</p>
    </div>
  </div>

  <!-- Bulk import -->
  <div class="bulk-card" id="bulkSection" style="display:none">
    <h2>批次匯入 JSON</h2>
    <p>貼上 JSON 陣列，每筆需包含 <code style="color:var(--accent)">pattern</code> 與 <code style="color:var(--accent)">replacement</code> 欄位。<strong style="color:var(--danger)">匯入後會清空此組現有規則。</strong></p>
    <textarea id="bulkJson" placeholder='[
  {"pattern": "ISO 9001", "replacement": "iso 九零零一", "flags": ["IGNORECASE"]},
  {"pattern": "(?&lt;![A-Za-z])AI(?![A-Za-z])", "replacement": "ai", "flags": ["IGNORECASE"], "is_regex": true}
]'></textarea>
    <div class="bulk-actions">
      <button class="btn btn-primary" onclick="doBulkImport()">匯入</button>
      <button class="btn btn-ghost" onclick="hideBulkImport()">取消</button>
      <span class="bulk-hint">is_regex 預設 false（純文字比對）</span>
    </div>
  </div>

</div>

<!-- Add / Edit Modal -->
<div class="modal-backdrop" id="ruleModal">
  <div class="modal">
    <h2 id="modalTitle">新增規則</h2>
    <input type="hidden" id="editId">
    <div class="form-grid">
      <div class="form-group full">
        <label>比對 Pattern <span id="patternHint" style="color:var(--text-dim);font-size:11px">（純文字，系統自動加上安全比對）</span></label>
        <input id="fPattern" placeholder="例如：ISO 9001" autocomplete="off">
      </div>
      <div class="form-group full">
        <label>替換結果</label>
        <input id="fReplacement" placeholder="例如：iso 九零零一" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Flags</label>
        <div class="flags-group">
          <label class="flag-option">
            <input type="checkbox" name="flag" value="IGNORECASE" checked>
            <span class="flag-name">IGNORECASE</span>
            <span class="flag-desc">忽略大小寫</span>
          </label>
          <label class="flag-option">
            <input type="checkbox" name="flag" value="MULTILINE">
            <span class="flag-name">MULTILINE</span>
            <span class="flag-desc">多行模式</span>
          </label>
          <label class="flag-option">
            <input type="checkbox" name="flag" value="DOTALL">
            <span class="flag-name">DOTALL</span>
            <span class="flag-desc">. 匹配換行</span>
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>順序 order_num</label>
        <input id="fOrder" type="number" value="0" min="0">
        <div class="toggle-row" style="margin-top:10px">
          <input type="checkbox" id="fIsRegex" onchange="onRegexToggle(this)">
          <label for="fIsRegex" style="font-size:13px">進階模式（is_regex）</label>
        </div>
        <div id="regexHintBox" style="font-size:11px;color:var(--text-muted);padding:6px 2px;display:none">
          開啟後 pattern 直接作為 Regex 使用，繁體字元自動轉簡體
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveRule()">儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let currentSet = '';
let rules = [];

// ── Set list ─────────────────────────────────────────────
async function loadSetList() {
  try {
    const res = await fetch(`${getBase()}/replacements`);
    const sets = await res.json();
    const container = document.getElementById('setChips');
    if (!sets.length) {
      container.innerHTML = '<span class="set-list-empty">尚無任何規則組</span>';
      return;
    }
    container.innerHTML = sets.map(s => `
      <span class="set-chip" onclick="selectSet('${esc(s.set_name)}')">
        ${esc(s.set_name)}
        <span class="chip-count">${s.rule_count}</span>
      </span>
    `).join('');
  } catch(e) {
    document.getElementById('setChips').innerHTML = '<span class="set-list-empty">無法載入</span>';
  }
}

function selectSet(name) {
  document.getElementById('setNameInput').value = name;
  loadRules();
}

// ── Theme ────────────────────────────────────────────────
function toggleTheme() {
  const root = document.documentElement;
  const isDark = root.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('rtw-theme', next);
}
(function initTheme() {
  const saved = localStorage.getItem('rtw-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️' : '🌙';
})();

function getBase() { return window.location.origin; }

// ── Load rules ──────────────────────────────────────────
async function loadRules() {
  const name = document.getElementById('setNameInput').value.trim();
  if (!name) { toast('請輸入規則組名稱', 'error'); return; }
  currentSet = name;
  try {
    const res = await fetch(`${getBase()}/replacements/${encodeURIComponent(name)}`);
    rules = await res.json();
    renderTable();
    document.getElementById('statsBar').style.display = 'flex';
  } catch(e) { toast('載入失敗：' + e.message, 'error'); }
}

function renderTable() {
  const tbody = document.getElementById('rulesBody');
  document.getElementById('tableWrap').style.display = rules.length ? '' : 'none';
  document.getElementById('emptyState').style.display = rules.length ? 'none' : '';
  document.getElementById('ruleCount').textContent = rules.length;

  tbody.innerHTML = rules.map((r, i) => `
    <tr>
      <td style="color:var(--text-dim);font-size:12px">${r.order_num ?? i}</td>
      <td><div class="cell-pattern">${esc(r.pattern)}</div></td>
      <td><div class="cell-replacement">${esc(r.replacement)}</div></td>
      <td><span class="badge ${r.is_regex ? 'badge-regex' : 'badge-plain'}">${r.is_regex ? 'Regex' : '純文字'}</span></td>
      <td>${(r.flags||[]).map(f=>`<span class="badge badge-flag">${f}</span>`).join('')}</td>
      <td>
        <div class="actions">
          <button class="btn btn-ghost btn-sm" onclick="openEdit(${r.id})">編輯</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRule(${r.id})">刪除</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ── Modal ────────────────────────────────────────────────
function showAddForm() {
  if (!currentSet) { toast('請先載入規則組', 'error'); return; }
  document.getElementById('modalTitle').textContent = '新增規則';
  document.getElementById('editId').value = '';
  document.getElementById('fPattern').value = '';
  document.getElementById('fReplacement').value = '';
  document.getElementById('fOrder').value = rules.length;
  document.getElementById('fIsRegex').checked = false;
  setFlags(['IGNORECASE']);
  onRegexToggle(document.getElementById('fIsRegex'));
  document.getElementById('ruleModal').classList.add('open');
}

function openEdit(id) {
  const r = rules.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modalTitle').textContent = '編輯規則';
  document.getElementById('editId').value = id;
  document.getElementById('fPattern').value = r.pattern;
  document.getElementById('fReplacement').value = r.replacement;
  document.getElementById('fOrder').value = r.order_num ?? 0;
  document.getElementById('fIsRegex').checked = !!r.is_regex;
  setFlags(r.flags || []);
  onRegexToggle(document.getElementById('fIsRegex'));
  document.getElementById('ruleModal').classList.add('open');
}

function closeModal() {
  document.getElementById('ruleModal').classList.remove('open');
}

function setFlags(selected) {
  document.querySelectorAll('input[name="flag"]').forEach(cb => {
    cb.checked = selected.includes(cb.value);
  });
}

function getFlags() {
  return Array.from(document.querySelectorAll('input[name="flag"]:checked')).map(cb => cb.value);
}

function onRegexToggle(cb) {
  const hint = document.getElementById('patternHint');
  const hintBox = document.getElementById('regexHintBox');
  if (cb.checked) {
    hint.textContent = '（進階：直接輸入完整 Regex）';
    hintBox.style.display = '';
  } else {
    hint.textContent = '（純文字，系統自動加上安全比對）';
    hintBox.style.display = 'none';
  }
}

async function saveRule() {
  const id = document.getElementById('editId').value;
  const body = {
    pattern:     document.getElementById('fPattern').value.trim(),
    replacement: document.getElementById('fReplacement').value.trim(),
    flags:       getFlags(),
    is_regex:    document.getElementById('fIsRegex').checked,
    order_num:   parseInt(document.getElementById('fOrder').value) || 0,
  };
  if (!body.pattern) { toast('Pattern 不能為空', 'error'); return; }
  try {
    const url = id
      ? `${getBase()}/replacements/${encodeURIComponent(currentSet)}/${id}`
      : `${getBase()}/replacements/${encodeURIComponent(currentSet)}`;
    const res = await fetch(url, {
      method: id ? 'PUT' : 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(await res.text());
    toast(id ? '規則已更新' : '規則已新增', 'success');
    closeModal();
    loadRules();
  } catch(e) { toast('儲存失敗：' + e.message, 'error'); }
}

// ── Delete ───────────────────────────────────────────────
async function deleteRule(id) {
  if (!confirm('確定要刪除這條規則？')) return;
  try {
    const res = await fetch(`${getBase()}/replacements/${encodeURIComponent(currentSet)}/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    toast('已刪除', 'success');
    loadRules();
  } catch(e) { toast('刪除失敗：' + e.message, 'error'); }
}

async function clearAllRules() {
  if (!confirm(`確定要清空「${currentSet}」的所有規則？`)) return;
  try {
    const res = await fetch(`${getBase()}/replacements/${encodeURIComponent(currentSet)}/bulk`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: '[]',
    });
    if (!res.ok) throw new Error(await res.text());
    toast('已清空', 'success');
    loadRules();
  } catch(e) { toast('操作失敗：' + e.message, 'error'); }
}

// ── Bulk import ──────────────────────────────────────────
function showBulkImport() { document.getElementById('bulkSection').style.display = ''; }
function hideBulkImport() { document.getElementById('bulkSection').style.display = 'none'; }

async function doBulkImport() {
  let data;
  try { data = JSON.parse(document.getElementById('bulkJson').value); }
  catch(e) { toast('JSON 格式錯誤：' + e.message, 'error'); return; }
  if (!Array.isArray(data)) { toast('必須是 JSON 陣列', 'error'); return; }
  try {
    const res = await fetch(`${getBase()}/replacements/${encodeURIComponent(currentSet)}/bulk`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    const result = await res.json();
    toast(`成功匯入 ${result.imported} 條規則`, 'success');
    hideBulkImport();
    loadRules();
  } catch(e) { toast('匯入失敗：' + e.message, 'error'); }
}

// ── Utils ────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

document.getElementById('ruleModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('setNameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadRules();
});

// 初始載入規則組列表
loadSetList();

// loadRules 完成後重整 chip（數量可能變動）
const _origLoadRules = loadRules;
loadRules = async function() {
  await _origLoadRules();
  loadSetList();
};
</script>
</body>
</html>
