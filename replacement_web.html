<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>替換規則管理</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c8eff;
    --accent-hover: #8aa3ff;
    --accent-dim: rgba(108,142,255,0.12);
    --danger: #ff5c6c;
    --danger-hover: #ff7a87;
    --danger-dim: rgba(255,92,108,0.12);
    --success: #4ade80;
    --warn: #fbbf24;
    --text: #e2e8f0;
    --text-muted: #7b8db0;
    --text-dim: #4a5578;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 32px 16px;
  }

  .container { max-width: 1000px; margin: 0 auto; }

  /* Header */
  .header { margin-bottom: 32px; }
  .header h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, #6c8eff, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .header p { color: var(--text-muted); font-size: 13px; }

  /* Set selector bar */
  .set-bar {
    display: flex; gap: 10px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    margin-bottom: 24px;
  }
  .set-bar label { color: var(--text-muted); white-space: nowrap; font-size: 13px; }
  .set-bar input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    color: var(--text); font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  .set-bar input:focus { border-color: var(--accent); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; transition: all .15s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #0f1117; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .btn-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid transparent; }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Stats bar */
  .stats-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .stats-bar .count {
    font-size: 13px; color: var(--text-muted);
  }
  .stats-bar .count span { color: var(--accent); font-weight: 600; }

  /* Table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 24px;
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th {
    text-align: left; padding: 12px 16px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text-muted); border-bottom: 1px solid var(--border);
  }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--accent-dim); }

  .cell-pattern {
    font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px; color: #a78bfa;
    max-width: 260px; word-break: break-all;
  }
  .cell-replacement {
    font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px; color: #4ade80;
    max-width: 180px; word-break: break-all;
  }
  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 99px;
    font-size: 11px; font-weight: 600;
  }
  .badge-regex { background: rgba(251,191,36,.15); color: var(--warn); }
  .badge-plain { background: rgba(74,222,128,.12); color: var(--success); }
  .badge-flag {
    background: var(--accent-dim); color: var(--accent);
    margin: 1px 2px;
  }

  .actions { display: flex; gap: 6px; }

  /* Empty state */
  .empty {
    text-align: center; padding: 48px 16px; color: var(--text-dim);
  }
  .empty svg { opacity: .3; margin-bottom: 12px; }
  .empty p { font-size: 13px; }

  /* Form card */
  .form-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; margin-bottom: 24px;
  }
  .form-card h2 {
    font-size: 15px; font-weight: 600; margin-bottom: 18px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 9px 12px;
    color: var(--text); font-size: 13px; outline: none;
    font-family: inherit; transition: border-color .2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-group select option { background: var(--surface2); }

  .toggle-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .toggle-row label { font-size: 13px; color: var(--text); cursor: pointer; user-select: none; }
  .toggle-row .hint { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

  .form-actions {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border);
  }

  /* Bulk import */
  .bulk-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
  }
  .bulk-card h2 {
    font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text);
  }
  .bulk-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
  .bulk-card textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px;
    color: var(--text); font-family: 'Fira Code', monospace; font-size: 12px;
    outline: none; resize: vertical; min-height: 140px;
    transition: border-color .2s;
  }
  .bulk-card textarea:focus { border-color: var(--accent); }
  .bulk-actions { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
  .bulk-hint { font-size: 11px; color: var(--text-dim); margin-left: auto; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow); z-index: 9999;
    transform: translateY(80px); opacity: 0;
    transition: all .25s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: #14532d; color: var(--success); border: 1px solid rgba(74,222,128,.3); }
  #toast.error   { background: #450a0a; color: var(--danger);  border: 1px solid rgba(255,92,108,.3); }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 100; display: none; align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; width: 560px; max-width: 95vw;
    box-shadow: var(--shadow);
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal .form-actions { margin-top: 20px; }

  .divider { height: 1px; background: var(--border); margin: 6px 0; }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .set-bar { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>替換規則管理</h1>
    <p>管理 TTS 文字替換規則，輸入規則組名稱後載入進行新增、修改或刪除。</p>
  </div>

  <!-- Set selector -->
  <div class="set-bar">
    <label>規則組名稱</label>
    <input id="setNameInput" placeholder="例如：jti、healthy2、default" value="">
    <button class="btn btn-primary" onclick="loadRules()">載入規則</button>
    <button class="btn btn-ghost" onclick="showAddForm()">＋ 新增規則</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="count">共 <span id="ruleCount">0</span> 條規則</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="showBulkImport()">批次匯入</button>
      <button class="btn btn-danger btn-sm" onclick="clearAllRules()">清空此組</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="tableWrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>比對 Pattern</th>
          <th>替換結果</th>
          <th>類型</th>
          <th>Flags</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="rulesBody"></tbody>
    </table>
  </div>

  <div id="emptyState" style="display:none">
    <div class="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>此規則組目前沒有規則，點擊「新增規則」開始建立。</p>
    </div>
  </div>

  <!-- Bulk import -->
  <div class="bulk-card" id="bulkSection" style="display:none; margin-bottom:24px">
    <h2>批次匯入 JSON</h2>
    <p>貼上 JSON 陣列，每筆需包含 <code style="color:var(--accent)">pattern</code> 與 <code style="color:var(--accent)">replacement</code> 欄位。<strong style="color:var(--danger)">匯入後會清空此組現有規則。</strong></p>
    <textarea id="bulkJson" placeholder='[
  {"pattern": "ISO 9001", "replacement": "iso 九零零一", "flags": ["IGNORECASE"]},
  {"pattern": "(?&lt;![A-Za-z])AI(?![A-Za-z])", "replacement": "ai", "flags": ["IGNORECASE"], "is_regex": true}
]'></textarea>
    <div class="bulk-actions">
      <button class="btn btn-primary" onclick="doBulkImport()">匯入</button>
      <button class="btn btn-ghost" onclick="hideBulkImport()">取消</button>
      <span class="bulk-hint">is_regex 預設 false（純文字比對）</span>
    </div>
  </div>

</div><!-- /container -->

<!-- Add / Edit Modal -->
<div class="modal-backdrop" id="ruleModal">
  <div class="modal">
    <h2 id="modalTitle">新增規則</h2>
    <input type="hidden" id="editId">
    <div class="form-grid">
      <div class="form-group full">
        <label>比對 Pattern <span id="patternHint" style="color:var(--text-dim);font-size:11px">（純文字，系統自動加上安全比對）</span></label>
        <input id="fPattern" placeholder="例如：ISO 9001" autocomplete="off">
      </div>
      <div class="form-group full">
        <label>替換結果</label>
        <input id="fReplacement" placeholder="例如：iso 九零零一" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Flags（多選）</label>
        <select id="fFlags" multiple size="3" style="height:72px">
          <option value="IGNORECASE" selected>IGNORECASE（忽略大小寫）</option>
          <option value="MULTILINE">MULTILINE</option>
          <option value="DOTALL">DOTALL</option>
        </select>
      </div>
      <div class="form-group">
        <label>順序 order_num</label>
        <input id="fOrder" type="number" value="0" min="0">
      </div>
      <div class="form-group full">
        <div class="toggle-row">
          <input type="checkbox" id="fIsRegex" onchange="onRegexToggle(this)">
          <label for="fIsRegex">進階模式（is_regex）</label>
          <span class="hint">開啟後 pattern 直接作為 Regex 使用</span>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveRule()">儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let currentSet = '';
let rules = [];

function getBase() { return window.location.origin; }

// ── Load rules ──────────────────────────────────────────
async function loadRules() {
  const name = document.getElementById('setNameInput').value.trim();
  if (!name) { toast('請輸入規則組名稱', 'error'); return; }
  currentSet = name;
  try {
    const res = await fetch(`${getBase()}/replacements/${encodeURIComponent(name)}`);
    rules = await res.json();
    renderTable();
    document.getElementById('statsBar').style.display = 'flex';
  } catch(e) { toast('載入失敗：' + e.message, 'error'); }
}

function renderTable() {
  const tbody = document.getElementById('rulesBody');
  document.getElementById('tableWrap').style.display = rules.length ? '' : 'none';
  document.getElementById('emptyState').style.display = rules.length ? 'none' : '';
  document.getElementById('ruleCount').textContent = rules.length;

  tbody.innerHTML = rules.map((r, i) => `
    <tr>
      <td style="color:var(--text-dim);font-size:12px">${r.order_num ?? i}</td>
      <td><div class="cell-pattern">${esc(r.pattern)}</div></td>
      <td><div class="cell-replacement">${esc(r.replacement)}</div></td>
      <td><span class="badge ${r.is_regex ? 'badge-regex' : 'badge-plain'}">${r.is_regex ? 'Regex' : '純文字'}</span></td>
      <td>${(r.flags||[]).map(f=>`<span class="badge badge-flag">${f}</span>`).join('')}</td>
      <td>
        <div class="actions">
          <button class="btn btn-ghost btn-sm" onclick="openEdit(${r.id})">編輯</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRule(${r.id})">刪除</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ── Modal ────────────────────────────────────────────────
function showAddForm() {
  if (!currentSet) { toast('請先載入規則組', 'error'); return; }
  document.getElementById('modalTitle').textContent = '新增規則';
  document.getElementById('editId').value = '';
  document.getElementById('fPattern').value = '';
  document.getElementById('fReplacement').value = '';
  document.getElementById('fOrder').value = rules.length;
  document.getElementById('fIsRegex').checked = false;
  setFlagOptions(['IGNORECASE']);
  onRegexToggle(document.getElementById('fIsRegex'));
  document.getElementById('ruleModal').classList.add('open');
}

function openEdit(id) {
  const r = rules.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modalTitle').textContent = '編輯規則';
  document.getElementById('editId').value = id;
  document.getElementById('fPattern').value = r.pattern;
  document.getElementById('fReplacement').value = r.replacement;
  document.getElementById('fOrder').value = r.order_num ?? 0;
  document.getElementById('fIsRegex').checked = !!r.is_regex;
  setFlagOptions(r.flags || []);
  onRegexToggle(document.getElementById('fIsRegex'));
  document.getElementById('ruleModal').classList.add('open');
}

function closeModal() {
  document.getElementById('ruleModal').classList.remove('open');
}

function setFlagOptions(selected) {
  const sel = document.getElementById('fFlags');
  for (const opt of sel.options) opt.selected = selected.includes(opt.value);
}

function onRegexToggle(cb) {
  const hint = document.getElementById('patternHint');
  hint.textContent = cb.checked
    ? '（進階：直接輸入完整 Regex，繁體字元自動轉簡體）'
    : '（純文字，系統自動加上安全比對）';
}

async function saveRule() {
  const id = document.getElementById('editId').value;
  const sel = document.getElementById('fFlags');
  const flags = Array.from(sel.options).filter(o => o.selected).map(o => o.value);
  const body = {
    pattern:     document.getElementById('fPattern').value.trim(),
    replacement: document.getElementById('fReplacement').value.trim(),
    flags,
    is_regex:    document.getElementById('fIsRegex').checked,
    order_num:   parseInt(document.getElementById('fOrder').value) || 0,
  };
  if (!body.pattern) { toast('Pattern 不能為空', 'error'); return; }

  try {
    const url = id
      ? `${getBase()}/replacements/${encodeURIComponent(currentSet)}/${id}`
      : `${getBase()}/replacements/${encodeURIComponent(currentSet)}`;
    const res = await fetch(url, {
      method: id ? 'PUT' : 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(await res.text());
    toast(id ? '規則已更新' : '規則已新增', 'success');
    closeModal();
    loadRules();
  } catch(e) { toast('儲存失敗：' + e.message, 'error'); }
}

// ── Delete ───────────────────────────────────────────────
async function deleteRule(id) {
  if (!confirm('確定要刪除這條規則？')) return;
  try {
    const res = await fetch(`${getBase()}/replacements/${encodeURIComponent(currentSet)}/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    toast('已刪除', 'success');
    loadRules();
  } catch(e) { toast('刪除失敗：' + e.message, 'error'); }
}

async function clearAllRules() {
  if (!confirm(`確定要清空「${currentSet}」的所有規則？`)) return;
  try {
    const res = await fetch(`${getBase()}/replacements/${encodeURIComponent(currentSet)}/bulk`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: '[]',
    });
    if (!res.ok) throw new Error(await res.text());
    toast('已清空', 'success');
    loadRules();
  } catch(e) { toast('操作失敗：' + e.message, 'error'); }
}

// ── Bulk import ──────────────────────────────────────────
function showBulkImport() { document.getElementById('bulkSection').style.display = ''; }
function hideBulkImport() { document.getElementById('bulkSection').style.display = 'none'; }

async function doBulkImport() {
  let data;
  try { data = JSON.parse(document.getElementById('bulkJson').value); }
  catch(e) { toast('JSON 格式錯誤：' + e.message, 'error'); return; }
  if (!Array.isArray(data)) { toast('必須是 JSON 陣列', 'error'); return; }
  try {
    const res = await fetch(`${getBase()}/replacements/${encodeURIComponent(currentSet)}/bulk`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    const result = await res.json();
    toast(`成功匯入 ${result.imported} 條規則`, 'success');
    hideBulkImport();
    loadRules();
  } catch(e) { toast('匯入失敗：' + e.message, 'error'); }
}

// ── Utils ────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// Close modal on backdrop click
document.getElementById('ruleModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Enter key in set input
document.getElementById('setNameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadRules();
});
</script>
</body>
</html>
